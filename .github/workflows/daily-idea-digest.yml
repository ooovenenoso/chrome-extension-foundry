name: daily-idea-digest

on:
  schedule:
    - cron: '0 1,13 * * 1-5'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Override slot YYYY-MM-DD-HH (UTC).'
        required: false
        type: string
      count:
        description: 'Ideas per run (1-50).'
        required: false
        type: string
      skip_pr:
        description: 'Skip pr-drafter.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  research-score-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL || 'MiniMax-M2.7-highspeed' }}
      MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL || 'https://api.minimax.io/v1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Compute slot (UTC)
        id: slot
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            SLOT="${{ inputs.slot }}"
          else
            SLOT=$(date -u +%Y-%m-%d-%H)
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
      - name: research-collector
        id: research
        run: |
          COUNT="${{ inputs.count || 10 }}"
          node agents/scripts/research-collector.js \
            --slot "${{ steps.slot.outputs.slot }}" \
            --out docs/research/ \
            --model "${MINIMAX_MODEL}" \
            --count "${COUNT}"
      - name: idea-scorer
        run: |
          node agents/scripts/idea-scorer.js \
            --in "docs/research/${{ steps.slot.outputs.slot }}.json" \
            --out docs/ideas/
      - name: validate-contracts
        run: npm run validate
      - name: Check threshold
        id: check
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          POOL="docs/ideas/${SLOT}.json"
          if [ ! -f "$POOL" ]; then
            echo "spec_threshold=false" >> "$GITHUB_OUTPUT"
            echo "top_name=" >> "$GITHUB_OUTPUT"
            echo "top_score=0" >> "$GITHUB_OUTPUT"
            echo "top_id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TOP_SCORE=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.score_total || 0);")
          TOP_NAME=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.name || '');")
          TOP_ID=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.id || '');")
          THRESHOLD=$(node -e "console.log(require('./agents/contracts/scoring-rubric.v1.json').thresholds.min_score_for_spec);")
          if (( $(echo "$TOP_SCORE >= $THRESHOLD" | bc -l) )); then
            echo "spec_threshold=true" >> "$GITHUB_OUTPUT"
            echo "top_name=$TOP_NAME" >> "$GITHUB_OUTPUT"
            echo "top_score=$TOP_SCORE" >> "$GITHUB_OUTPUT"
            echo "top_id=$TOP_ID" >> "$GITHUB_OUTPUT"
          else
            echo "spec_threshold=false" >> "$GITHUB_OUTPUT"
            echo "top_name=$TOP_NAME" >> "$GITHUB_OUTPUT"
            echo "top_score=$TOP_SCORE" >> "$GITHUB_OUTPUT"
            echo "top_id=$TOP_ID" >> "$GITHUB_OUTPUT"
          fi
      - name: spec-writer
        if: steps.check.outputs.spec_threshold == 'true'
        id: spec
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          node agents/scripts/spec-writer.js \
            --idea "docs/ideas/${SLOT}.json" \
            --top 1 \
            --out docs/specs/ \
            --template docs/specs/_template/GOAL.md

      - name: Commit research + spec
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/research/ docs/ideas/ docs/specs/
          if ! git diff --cached --quiet; then
            git commit -m "chore(digest): daily AI ideas + scoring for ${{ steps.slot.outputs.slot }}${{ steps.check.outputs.spec_threshold == 'true' && ' (+ spec)' || '' }}"
            git push
          fi

      - name: Open PR with scaffold (uses peter-evans/create-pull-request)
        if: steps.check.outputs.spec_threshold == 'true' && inputs.skip_pr != true
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: feat/mvp-${{ steps.check.outputs.top_id }}-scaffold
          base: main
          title: 'feat(${{ steps.check.outputs.top_id }}): MVP scaffold'
          body: |
            ## What

            Auto-generated MVP scaffold for the top-scoring idea from `${{ steps.slot.outputs.slot }}`.

            **Top idea:** ${{ steps.check.outputs.top_name }}
            **Score:** ${{ steps.check.outputs.top_score }}

            ## Source

            - Spec: `docs/specs/${{ steps.check.outputs.top_id }}/GOAL.md`
            - Backlog: `docs/specs/${{ steps.check.outputs.top_id }}/BACKLOG.md`
            - Idea pool: `docs/ideas/${{ steps.slot.outputs.slot }}.json`

            ## Test plan

            - [ ] `npm test` exits 0
            - [ ] CI green on this branch
            - [ ] Spec sections §1-§10 reviewed
          add-paths: |
            src/${{ steps.check.outputs.top_id }}/**
            tests/**
            STRIPE_LINKS.md
          commit-message: 'feat(${{ steps.check.outputs.top_id }}): MVP scaffold per docs/specs/${{ steps.check.outputs.top_id }}/GOAL.md'

      - name: Ping Telegram
        if: steps.check.outputs.spec_threshold == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            daily-idea-digest · ${{ steps.slot.outputs.slot }}
            Top: ${{ steps.check.outputs.top_name }} (score ${{ steps.check.outputs.top_score }})
            ${{ steps.cpr.outputs.pull-request-number && format('PR opened: #{0}', steps.cpr.outputs.pull-request-number) || 'Spec drafted (PR opening skipped or failed)' }}
