name: daily-idea-digest

on:
  schedule:
    # 2x daily Mon-Fri.
    # 13:00 UTC = 09:00 America/Puerto_Rico (AST, UTC-4)
    # 01:00 UTC = 21:00 AST previous day
    - cron: '0 1,13 * * 1-5'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Override slot YYYY-MM-DD-HH (UTC). Default = now.'
        required: false
        type: string
      count:
        description: 'Ideas per run (1-50). Default 10.'
        required: false
        type: string
      skip_pr:
        description: 'Skip the pr-drafter step (set true for research-only runs).'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  research-score-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL || 'MiniMax-M2.7-highspeed' }}
      MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL || 'https://api.minimax.io/v1' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci --no-audit --no-fund
      - name: Compute slot (UTC)
        id: slot
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            SLOT="${{ inputs.slot }}"
          else
            SLOT=$(date -u +%Y-%m-%d-%H)
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Slot: $SLOT"

      - name: research-collector (AI + dedup)
        id: research
        run: |
          COUNT="${{ inputs.count || 10 }}"
          node agents/scripts/research-collector.js \
            --slot "${{ steps.slot.outputs.slot }}" \
            --out docs/research/ \
            --model "${MINIMAX_MODEL}" \
            --count "${COUNT}"

      - name: idea-scorer
        run: |
          node agents/scripts/idea-scorer.js \
            --in "docs/research/${{ steps.slot.outputs.slot }}.json" \
            --out docs/ideas/

      - name: validate-contracts
        run: npm run validate

      - name: Check threshold
        id: check
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          POOL="docs/ideas/${SLOT}.json"
          # Default outputs (overwritten if pool exists + threshold met).
          printf 'spec_threshold=false\n' > "$GITHUB_OUTPUT"
          printf 'top_name=\n' >> "$GITHUB_OUTPUT"
          printf 'top_score=0\n' >> "$GITHUB_OUTPUT"
          printf 'top_id=\n' >> "$GITHUB_OUTPUT"
          if [ ! -f "$POOL" ]; then
            echo "no pool â€” silent"
            exit 0
          fi
          TOP_SCORE=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.score_total || 0);")
          TOP_NAME=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.name || '');")
          TOP_ID=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.id || '');")
          THRESHOLD=$(node -e "console.log(require('./agents/contracts/scoring-rubric.v1.json').thresholds.min_score_for_spec);")
          echo "top=$TOP_SCORE threshold=$THRESHOLD"
          if [ "$(echo "$TOP_SCORE >= $THRESHOLD" | bc -l)" = "1" ]; then
            printf 'spec_threshold=true\n' > "$GITHUB_OUTPUT"
            printf 'top_name=%s\n' "$TOP_NAME" >> "$GITHUB_OUTPUT"
            printf 'top_score=%s\n' "$TOP_SCORE" >> "$GITHUB_OUTPUT"
            printf 'top_id=%s\n' "$TOP_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: spec-writer (if spec_threshold=true)
        if: steps.check.outputs.spec_threshold == 'true'
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          node agents/scripts/spec-writer.js \
            --idea "docs/ideas/${SLOT}.json" \
            --top 1 \
            --out docs/specs/ \
            --template docs/specs/_template/GOAL.md

      - name: Commit research + spec
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/research/ docs/ideas/ docs/specs/
          if ! git diff --cached --quiet; then
            # Pull rebase in case another workflow push landed first.
            git pull --rebase --autostash origin main || git pull --rebase origin main
            MSG="chore(digest): daily AI ideas + scoring for ${{ steps.slot.outputs.slot }}"
            if [ "${{ steps.check.outputs.spec_threshold }}" = "true" ]; then
              MSG="$MSG (+ spec)"
            fi
            git commit -m "$MSG"
            git push
          fi

      - name: pr-drafter (scaffold files to working tree)
        if: steps.check.outputs.spec_threshold == 'true' && inputs.skip_pr != true
        run: |
          TOP_ID="${{ steps.check.outputs.top_id }}"
          SPEC="docs/specs/${TOP_ID}/GOAL.md"
          if [ ! -f "$SPEC" ]; then
            echo "::error::spec $SPEC missing"; exit 1
          fi
          node agents/scripts/pr-drafter.js --spec "$SPEC"

      - name: Open PR with scaffold
        if: steps.check.outputs.spec_threshold == 'true' && inputs.skip_pr != true
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: feat/mvp-${{ steps.check.outputs.top_id }}-scaffold
          base: main
          title: 'feat(${{ steps.check.outputs.top_id }}): MVP scaffold'
          body: |
            ## What

            Auto-generated MVP scaffold for the top-scoring idea from `${{ steps.slot.outputs.slot }}`.

            **Top idea:** ${{ steps.check.outputs.top_name }}
            **Score:** ${{ steps.check.outputs.top_score }}

            ## Source

            - Spec: `docs/specs/${{ steps.check.outputs.top_id }}/GOAL.md`
            - Backlog: `docs/specs/${{ steps.check.outputs.top_id }}/BACKLOG.md`
            - Idea pool: `docs/ideas/${{ steps.slot.outputs.slot }}.json`

            ## Test plan

            - [ ] `npm test` exits 0
            - [ ] CI green on this branch
            - [ ] Spec sections Â§1-Â§10 reviewed
          commit-message: 'feat(${{ steps.check.outputs.top_id }}): MVP scaffold per docs/specs/${{ steps.check.outputs.top_id }}/GOAL.md'

      - name: Ping Telegram
        if: steps.check.outputs.spec_threshold == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            daily-idea-digest Â· ${{ steps.slot.outputs.slot }}
            Top: ${{ steps.check.outputs.top_name }} (score ${{ steps.check.outputs.top_score }})
            ${{ steps.cpr.outputs.pull-request-number && format('PR opened: #{0}', steps.cpr.outputs.pull-request-number) || 'Spec drafted (PR step skipped or failed)' }}
