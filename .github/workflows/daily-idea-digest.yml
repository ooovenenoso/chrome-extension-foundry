name: daily-idea-digest

on:
  schedule:
    # 2x daily Mon-Fri.
    # 13:00 UTC = 09:00 America/Puerto_Rico (AST, UTC-4)
    # 01:00 UTC = 21:00 AST previous day
    - cron: '0 1,13 * * 1-5'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Override slot YYYY-MM-DD-HH (UTC). Default = now.'
        required: false
        type: string
      count:
        description: 'Ideas per run (1-50). Default 10.'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  research-score-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL || 'MiniMax-M2.7-highspeed' }}
      MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL || 'https://api.minimax.io/v1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Compute slot (UTC)
        id: slot
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            SLOT="${{ inputs.slot }}"
          else
            SLOT=$(date -u +%Y-%m-%d-%H)
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Slot: $SLOT"

      - name: research-collector (AI + dedup)
        id: research
        env:
          MINIMAX_API_KEY: ${{ env.MINIMAX_API_KEY }}
        run: |
          COUNT="${{ inputs.count || 10 }}"
          node agents/scripts/research-collector.js \
            --slot "${{ steps.slot.outputs.slot }}" \
            --out docs/research/ \
            --model "${MINIMAX_MODEL}" \
            --count "${COUNT}"

      - name: idea-scorer
        id: score
        run: |
          node agents/scripts/idea-scorer.js \
            --in "docs/research/${{ steps.slot.outputs.slot }}.json" \
            --out docs/ideas/

      - name: validate-contracts
        run: npm run validate

      - name: Check if any candidate crossed digest threshold
        id: ping
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          POOL="docs/ideas/${SLOT}.json"
          if [ ! -f "$POOL" ]; then
            echo "no idea pool produced — silent"
            echo "ping=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TOP=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.score_total || 0);")
          THRESHOLD=$(node -e "console.log(require('./agents/contracts/scoring-rubric.v1.json').thresholds.min_score_for_digest_ping);")
          echo "top=$TOP threshold=$THRESHOLD"
          if (( $(echo "$TOP >= $THRESHOLD" | bc -l) )); then
            echo "ping=true" >> "$GITHUB_OUTPUT"
            echo "top_name=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.name || '');")" >> "$GITHUB_OUTPUT"
            echo "top_score=$TOP" >> "$GITHUB_OUTPUT"
          else
            echo "ping=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit snapshot if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/research/ docs/ideas/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore(digest): daily AI ideas + scoring for ${{ steps.slot.outputs.slot }}"
            git push
          fi

      - name: Ping Telegram on threshold hit
        if: steps.ping.outputs.ping == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            daily-idea-digest · ${{ steps.slot.outputs.slot }}
            Top idea: ${{ steps.ping.outputs.top_name }} (score ${{ steps.ping.outputs.top_score }})
            Files: docs/research/${{ steps.slot.outputs.slot }}.json, docs/ideas/${{ steps.slot.outputs.slot }}.json
