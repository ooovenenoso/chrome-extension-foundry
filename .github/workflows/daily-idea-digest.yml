name: daily-idea-digest

on:
  schedule:
    # 2x daily Mon-Fri.
    # 13:00 UTC = 09:00 America/Puerto_Rico (AST, UTC-4)
    # 01:00 UTC = 21:00 AST previous day
    - cron: '0 1,13 * * 1-5'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Override slot YYYY-MM-DD-HH (UTC). Default = now.'
        required: false
        type: string
      count:
        description: 'Ideas per run (1-50). Default 15.'
        required: false
        type: string
      skip_pr:
        description: 'Skip the pr-drafter step (research-only run).'
        required: false
        type: boolean
        default: false
      force_pr:
        description: 'Force the pr-drafter step even on a low-score run.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-idea-digest
  cancel-in-progress: false

jobs:
  research-score-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL || 'MiniMax-M3' }}
      MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL || 'https://api.minimax.io/v1' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Compute slot (UTC)
        id: slot
        run: |
          if [ -n "${{ inputs.slot }}" ]; then
            SLOT="${{ inputs.slot }}"
          else
            SLOT=$(date -u +%Y-%m-%d-%H)
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "Slot: $SLOT"

      - name: research-collector (AI + dedup)
        id: research
        run: |
          COUNT="${{ inputs.count || 15 }}"
          node agents/scripts/research-collector.js \
            --slot "${{ steps.slot.outputs.slot }}" \
            --out docs/research/ \
            --model "${MINIMAX_MODEL}" \
            --count "${COUNT}"

      - name: idea-scorer (rubric v2)
        run: |
          node agents/scripts/idea-scorer.js \
            --in "docs/research/${{ steps.slot.outputs.slot }}.json" \
            --out docs/ideas/

      - name: validate-contracts
        run: npm run validate

      - name: Check threshold (rubric v2 = 6.0)
        id: check
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          POOL="docs/ideas/${SLOT}.json"
          printf 'spec_threshold=false\n' > "$GITHUB_OUTPUT"
          printf 'top_name=\n' >> "$GITHUB_OUTPUT"
          printf 'top_score=0\n' >> "$GITHUB_OUTPUT"
          printf 'top_id=\n' >> "$GITHUB_OUTPUT"
          if [ ! -f "$POOL" ]; then
            echo "no pool — silent"; exit 0
          fi
          TOP_SCORE=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.score_total || 0);")
          TOP_NAME=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.name || '');")
          TOP_ID=$(node -e "const p=require('./$POOL'); console.log(p.candidates[0]?.id || '');")
          THRESHOLD=$(node -e "console.log(require('./agents/contracts/scoring-rubric.v2.json').thresholds.min_score_for_spec);")
          echo "top=$TOP_SCORE threshold=$THRESHOLD"
          if [ "$(echo "$TOP_SCORE >= $THRESHOLD" | bc -l)" = "1" ]; then
            printf 'spec_threshold=true\n' > "$GITHUB_OUTPUT"
            printf 'top_name=%s\n' "$TOP_NAME" >> "$GITHUB_OUTPUT"
            printf 'top_score=%s\n' "$TOP_SCORE" >> "$GITHUB_OUTPUT"
            printf 'top_id=%s\n' "$TOP_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: spec-writer
        if: steps.check.outputs.spec_threshold == 'true' || inputs.force_pr == 'true'
        run: |
          SLOT="${{ steps.slot.outputs.slot }}"
          node agents/scripts/spec-writer.js \
            --idea "docs/ideas/${SLOT}.json" \
            --top 1 \
            --out docs/specs/ \
            --template docs/specs/_template/GOAL.md

      - name: Commit research + spec
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/research/ docs/ideas/ docs/specs/
          if ! git diff --cached --quiet; then
            git pull --rebase --autostash origin main || git pull --rebase origin main
            MSG="chore(digest): daily AI ideas + scoring for ${{ steps.slot.outputs.slot }}"
            if [ "${{ steps.check.outputs.spec_threshold }}" = "true" ]; then
              MSG="$MSG (+ spec)"
            fi
            git commit -m "$MSG"
            git push
          fi

      - name: pr-drafter (real MV3 + syntax guard)
        if: (steps.check.outputs.spec_threshold == 'true' || inputs.force_pr == 'true') && inputs.skip_pr != 'true'
        id: draft
        run: |
          TOP_ID="${{ steps.check.outputs.top_id }}"
          SPEC="docs/specs/${TOP_ID}/GOAL.md"
          if [ ! -f "$SPEC" ]; then
            echo "::error::spec $SPEC missing"; exit 1
          fi
          node agents/scripts/pr-drafter.js --spec "$SPEC"

      - name: Verify generated extension
        if: (steps.check.outputs.spec_threshold == 'true' || inputs.force_pr == 'true') && inputs.skip_pr != 'true'
        id: verify
        run: |
          TOP_ID="${{ steps.check.outputs.top_id }}"
          npm test
          npm run package:extension -- "$TOP_ID"
          unzip -t "dist/${TOP_ID}-v0.1.0.zip"

      - name: Commit scaffold (only if verify succeeded)
        if: (steps.check.outputs.spec_threshold == 'true' || inputs.force_pr == 'true') && inputs.skip_pr != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add src/ tests/
          if ! git diff --cached --quiet; then
            git pull --rebase --autostash origin main || git pull --rebase origin main
            git commit -m "feat(${{ steps.check.outputs.top_id }}): real MV3 scaffold"
            git push
          fi

      - name: Open PR
        if: (steps.check.outputs.spec_threshold == 'true' || inputs.force_pr == 'true') && inputs.skip_pr != 'true' && steps.verify.outcome == 'success'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: feat/mvp-${{ steps.check.outputs.top_id }}-real-mv3
          base: main
          title: 'feat(${{ steps.check.outputs.top_id }}): real MV3 MVP extension'
          body: |
            ## What

            Auto-generated real MV3 MVP extension for the top-scoring idea from `${{ steps.slot.outputs.slot }}`.

            **Top idea:** ${{ steps.check.outputs.top_name }}
            **Score:** ${{ steps.check.outputs.top_score }}

            ## Source

            - Spec: `docs/specs/${{ steps.check.outputs.top_id }}/GOAL.md`
            - Idea pool: `docs/ideas/${{ steps.slot.outputs.slot }}.json`

            ## Generated artifact

            - Extension source: `src/${{ steps.check.outputs.top_id }}/`
            - Package: `npm run package:extension -- ${{ steps.check.outputs.top_id }}`

            ## Test plan

            - [x] `npm test` exits 0
            - [x] `npm run package:extension -- ${{ steps.check.outputs.top_id }}` exits 0
            - [x] `unzip -t dist/${{ steps.check.outputs.top_id }}-v0.1.0.zip` exits 0
            - [x] syntax-guard validated all generated JS
          commit-message: 'feat(${{ steps.check.outputs.top_id }}): real MV3 MVP extension per docs/specs/${{ steps.check.outputs.top_id }}/GOAL.md'

      - name: Ping Telegram
        if: always() && steps.cpr.outputs.pull-request-number != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            foundry · ${{ steps.slot.outputs.slot }}
            top: ${{ steps.check.outputs.top_name }} (score ${{ steps.check.outputs.top_score }})
            ${{ steps.cpr.outputs.pull-request-number && format('PR: #{0}', steps.cpr.outputs.pull-request-number) || (steps.verify.outcome == 'success' && 'verify passed, PR step skipped' || 'verify failed') }}

      - name: Orphan branch guard (prune feat/mvp-* > 24h old, no open PR)
        if: always()
        run: |
          node scripts/orphan-branch-guard.js \
            --max-age-hours 24 \
            --prefix feat/mvp- \
            2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
