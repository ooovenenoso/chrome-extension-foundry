name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Validate contracts
        run: npm run validate

      - name: Unit + integration
        run: npm test

      - name: Build agent bundles (smoke)
        run: |
          node --check agents/scripts/research-collector.js
          node --check agents/scripts/idea-scorer.js
          node --check agents/scripts/spec-writer.js
          node --check agents/scripts/pr-drafter.js
          node --check scripts/syntax-guard.js
          node --check scripts/orphan-branch-guard.js
          node --check scripts/scoring-rubric.migrate.js

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --no-audit --no-fund

      - name: Install Playwright
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: |
          npm install --no-save playwright@1.49.0
          npx playwright install chromium

      - name: Run e2e
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.pw-browsers
        run: |
          if compgen -G "tests/e2e/*.test.js" > /dev/null; then
            npm run test:e2e
          else
            echo "no e2e tests yet — skip"
            exit 0
          fi
