name: ci-auto-fix

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Failed GitHub Actions run id to inspect.'
        required: true
        type: string

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ci-auto-fix-${{ github.event.workflow_run.pull_requests[0].number || inputs.run_id || github.run_id }}
  cancel-in-progress: false

jobs:
  fix:
    name: Inspect failed CI and push safe fix
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request')
    env:
      CI_AUTO_FIX_RUN_ID: ${{ inputs.run_id || github.event.workflow_run.id }}
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_MODEL: ${{ vars.MINIMAX_MODEL || 'MiniMax-M3' }}
      MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL || 'https://api.minimax.io/v1' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run repo-resident CI auto-fixer
        run: |
          node scripts/ci-auto-fixer.js \
            --repo "${{ github.repository }}" \
            --run-id "$CI_AUTO_FIX_RUN_ID"
